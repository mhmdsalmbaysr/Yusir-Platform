<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة يُسر — تسوّق من متاجر اليمن على الخريطة</title>

    <!-- مكتبة الخرائط Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <!-- أيقونات Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- خط عربي -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- التنسيقات -->
    <link rel="stylesheet" href="css/style.css">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <!-- شريط علوي -->
    <header class="topbar">
        <div class="brand">
            <i class="fas fa-store-alt"></i>
            <span>منصة <strong>يُسر</strong></span>
        </div>
        <div class="topbar-actions">
            <button id="cartToggle" class="cart-btn" aria-label="عربة التسوق">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartBadge" class="cart-badge">0</span>
            </button>
        </div>
    </header>

    <!-- حاوية الخريطة -->
    <div id="map"></div>

    <!-- شريط البحث وفلترة المتاجر -->
    <div id="searchBar" class="search-bar">
        <i class="fas fa-magnifying-glass"></i>
        <input id="searchInput" type="text" placeholder="ابحث عن متجر أو مدينة أو تصنيف…" autocomplete="off">
        <span id="searchCount" class="search-count"></span>
        <button id="openOnlyToggle" class="open-toggle" title="المتاجر المفتوحة فقط"><i class="fas fa-clock"></i></button>
    </div>

    <!-- شاشة التحميل -->
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>جاري تحميل المتاجر على الخريطة…</p>
    </div>

    <!-- ===== اللوحة الجانبية للمتجر (Store Sidebar) ===== -->
    <aside id="storeSidebar" class="store-sidebar">
        <button id="closeSidebar" class="close-btn" aria-label="إغلاق"><i class="fas fa-times"></i></button>

        <div class="store-hero">
            <img id="storeImage" src="" alt="صورة المتجر">
            <div class="store-hero-overlay">
                <span id="storeStatus" class="status-pill"></span>
            </div>
        </div>

        <div class="store-head">
            <h2 id="storeName"></h2>
            <div class="store-meta">
                <span id="storeCategory" class="meta-chip"></span>
                <span class="meta-chip"><i class="fas fa-location-dot"></i> <span id="storeLocation"></span></span>
                <span class="meta-chip"><i class="fas fa-star"></i> <span id="storeRating"></span></span>
            </div>
            <p class="store-delivery"><i class="fas fa-motorcycle"></i> رسوم التوصيل: <span id="storeDelivery"></span></p>
        </div>

        <div class="products-head">
            <h3><i class="fas fa-box-open"></i> المنتجات</h3>
            <div class="store-search">
                <i class="fas fa-magnifying-glass"></i>
                <input id="productSearch" type="text" placeholder="ابحث داخل المتجر…" autocomplete="off">
            </div>
        </div>

        <!-- شريط تصنيفات المنتجات -->
        <div id="categoryBar" class="category-bar"></div>

        <!-- حاوية المنتجات الديناميكية -->
        <div id="productsContainer" class="products-grid"></div>
        <div id="noProducts" class="no-products" style="display:none">لا توجد منتجات مطابقة</div>

        <!-- ===== قسم التقييمات والمراجعات ===== -->
        <div class="reviews-section">
            <div class="reviews-head">
                <h3><i class="fas fa-comments"></i> التقييمات والمراجعات</h3>
                <div class="reviews-summary">
                    <span id="revAvg" class="rev-avg">0.0</span>
                    <span id="revStars" class="rev-stars"></span>
                    <span id="revCount" class="rev-count"></span>
                </div>
            </div>

            <!-- نموذج إضافة مراجعة -->
            <div class="review-form">
                <input id="revName" placeholder="اسمك" autocomplete="off">
                <div class="star-input" id="starInput">
                    <i class="far fa-star" data-v="1"></i>
                    <i class="far fa-star" data-v="2"></i>
                    <i class="far fa-star" data-v="3"></i>
                    <i class="far fa-star" data-v="4"></i>
                    <i class="far fa-star" data-v="5"></i>
                </div>
                <textarea id="revText" rows="2" placeholder="شارك تجربتك مع هذا المتجر…"></textarea>
                <button id="revSubmit" class="btn-add"><i class="fas fa-paper-plane"></i> أضف مراجعتك</button>
            </div>

            <!-- قائمة المراجعات -->
            <div id="reviewsList" class="reviews-list"></div>
        </div>
    </aside>

    <!-- ===== نافذة تفاصيل المنتج (Quick View) ===== -->
    <div id="productModal" class="product-modal">
        <div class="pm-card">
            <button id="pmClose" class="pm-close" aria-label="إغلاق"><i class="fas fa-times"></i></button>
            <div class="pm-img"><img id="pmImage" src="" alt="منتج"></div>
            <div class="pm-body">
                <span id="pmCategory" class="pm-cat"></span>
                <h2 id="pmName"></h2>
                <div class="pm-rating"><i class="fas fa-star"></i> <span id="pmRating"></span></div>
                <p id="pmDesc" class="pm-desc"></p>
                <div class="pm-price-row">
                    <span id="pmPrice" class="pm-price"></span>
                    <span id="pmOld" class="pm-old"></span>
                </div>
                <div class="pm-actions">
                    <div class="stepper">
                        <button id="pmMinus">−</button>
                        <span id="pmQty">1</span>
                        <button id="pmPlus">+</button>
                    </div>
                    <button id="pmAdd" class="pm-add"><i class="fas fa-cart-plus"></i> أضف للسلة</button>
                </div>
            </div>
        </div>
    </div>

    <!-- ===== لوحة عربة التسوق (Cart Panel) ===== -->
    <aside id="cartPanel" class="cart-panel">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> عربة التسوق</h3>
            <button id="closeCart" class="close-btn" aria-label="إغلاق"><i class="fas fa-times"></i></button>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>الإجمالي</span>
                <span id="cartTotal">0 ريال</span>
            </div>
            <button id="checkoutBtn" class="btn-checkout"><i class="fab fa-whatsapp"></i> إتمام الطلب</button>
        </div>
    </aside>

    <!-- خلفية معتمة عند فتح اللوحات -->
    <div id="backdrop" class="backdrop"></div>

    <!-- إشعار منبثق -->
    <div id="toast" class="toast"></div>

    <!-- ===== نموذج إتمام الطلب ===== -->
    <div id="checkoutModal" class="product-modal">
        <div class="pm-card co-card">
            <button id="coClose" class="pm-close" aria-label="إغلاق"><i class="fas fa-times"></i></button>
            <div class="co-body">
                <h2><i class="fas fa-clipboard-check"></i> إتمام الطلب</h2>
                <p class="co-sub">أدخل بياناتك لإرسال الطلب إلى المتجر عبر واتساب.</p>
                <div class="fld"><label>الاسم الكامل *</label><input id="coName" placeholder="مثلاً: محمد علي"></div>
                <div class="fld"><label>رقم الهاتف *</label><input id="coPhone" type="tel" placeholder="مثلاً: 7XXXXXXXX"></div>
                <div class="fld"><label>العنوان / مكان التسليم *</label><input id="coAddress" placeholder="المدينة، الحي، أقرب معلم"></div>
                <div class="fld"><label>ملاحظات (اختياري)</label><input id="coNotes" placeholder="أي تفاصيل إضافية للطلب"></div>
                <div class="co-summary" id="coSummary"></div>
                <button id="coSubmit" class="pm-add"><i class="fab fa-whatsapp"></i> إرسال الطلب عبر واتساب</button>
            </div>
        </div>
    </div>

    <!-- منطق التطبيق -->
    <script src="app.js"></script>
</body>
</html>
