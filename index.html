<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة يُسر — تسوّق من متاجر اليمن على الخريطة</title>

    <!-- مكتبة الخرائط Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <!-- أيقونات Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <!-- خط عربي -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- التنسيقات -->
    <link rel="stylesheet" href="css/style.css">

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>
<body>

    <!-- شريط علوي -->
    <header class="topbar">
        <div class="brand">
            <i class="fas fa-store-alt"></i>
            <span>منصة <strong>يُسر</strong></span>
        </div>
        <div class="topbar-actions">
            <button id="cartToggle" class="cart-btn" aria-label="عربة التسوق">
                <i class="fas fa-shopping-cart"></i>
                <span id="cartBadge" class="cart-badge">0</span>
            </button>
        </div>
    </header>

    <!-- حاوية الخريطة -->
    <div id="map"></div>

    <!-- شريط البحث وفلترة المتاجر -->
    <div id="searchBar" class="search-bar">
        <i class="fas fa-magnifying-glass"></i>
        <input id="searchInput" type="text" placeholder="ابحث عن متجر أو مدينة أو تصنيف…" autocomplete="off">
        <span id="searchCount" class="search-count"></span>
    </div>

    <!-- شاشة التحميل -->
    <div id="loader" class="loader">
        <div class="spinner"></div>
        <p>جاري تحميل المتاجر على الخريطة…</p>
    </div>

    <!-- ===== اللوحة الجانبية للمتجر (Store Sidebar) ===== -->
    <aside id="storeSidebar" class="store-sidebar">
        <button id="closeSidebar" class="close-btn" aria-label="إغلاق"><i class="fas fa-times"></i></button>

        <div class="store-hero">
            <img id="storeImage" src="" alt="صورة المتجر">
            <div class="store-hero-overlay">
                <span id="storeStatus" class="status-pill"></span>
            </div>
        </div>

        <div class="store-head">
            <h2 id="storeName"></h2>
            <div class="store-meta">
                <span id="storeCategory" class="meta-chip"></span>
                <span class="meta-chip"><i class="fas fa-location-dot"></i> <span id="storeLocation"></span></span>
                <span class="meta-chip"><i class="fas fa-star"></i> <span id="storeRating"></span></span>
            </div>
            <p class="store-delivery"><i class="fas fa-motorcycle"></i> رسوم التوصيل: <span id="storeDelivery"></span></p>
        </div>

        <div class="products-head">
            <h3><i class="fas fa-box-open"></i> المنتجات</h3>
        </div>

        <!-- حاوية المنتجات الديناميكية -->
        <div id="productsContainer" class="products-grid"></div>
    </aside>

    <!-- ===== لوحة عربة التسوق (Cart Panel) ===== -->
    <aside id="cartPanel" class="cart-panel">
        <div class="cart-header">
            <h3><i class="fas fa-shopping-cart"></i> عربة التسوق</h3>
            <button id="closeCart" class="close-btn" aria-label="إغلاق"><i class="fas fa-times"></i></button>
        </div>
        <div id="cartItems" class="cart-items"></div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>الإجمالي</span>
                <span id="cartTotal">0 ريال</span>
            </div>
            <button id="checkoutBtn" class="btn-checkout"><i class="fab fa-whatsapp"></i> إتمام الطلب</button>
        </div>
    </aside>

    <!-- خلفية معتمة عند فتح اللوحات -->
    <div id="backdrop" class="backdrop"></div>

    <!-- إشعار منبثق -->
    <div id="toast" class="toast"></div>

    <!-- منطق التطبيق -->
    <script src="app.js"></script>
</body>
</html>
