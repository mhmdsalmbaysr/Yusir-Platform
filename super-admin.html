<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>لوحة السوبر أدمن — يُسر</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/dashboard.css">
  <script>if (sessionStorage.getItem("yusir_sa_session") !== "1") location.replace("login.html?redirect=superadmin");</script>
</head>
<body>

  <div id="app">
    <div class="dash-top">
      <div class="b"><i class="fas fa-shield-halved"></i> يُسر <span class="badge">سوبر أدمن</span></div>
      <div class="right">
        <a class="linkx" href="index.html">عرض المنصة</a>
        <button class="logout" id="logout"><i class="fas fa-right-from-bracket"></i> خروج</button>
      </div>
    </div>

    <div class="wrap">
      <div class="stats">
        <div class="stat blue"><i class="fas fa-store ic"></i><div class="n" id="stTotal">0</div><div class="l">إجمالي المتاجر</div></div>
        <div class="stat green"><i class="fas fa-circle-check ic"></i><div class="n" id="stActive">0</div><div class="l">اشتراكات فعّالة</div></div>
        <div class="stat red"><i class="fas fa-circle-xmark ic"></i><div class="n" id="stExpired">0</div><div class="l">منتهية / معلّقة</div></div>
        <div class="stat"><i class="fas fa-sack-dollar ic"></i><div class="n" id="stRevenue">0</div><div class="l">الإيراد الشهري (ريال)</div></div>
      </div>

      <div class="card">
        <h3><i class="fas fa-user-plus"></i> إضافة اشتراك متجر جديد</h3>
        <div class="frm">
          <div class="fld"><label>اسم المتجر</label><input id="mStore" placeholder="بقالة الهناء"></div>
          <div class="fld"><label>اسم المالك</label><input id="mOwner" placeholder="محمد علي"></div>
          <div class="fld"><label>البريد (للدخول)</label><input id="mEmail" placeholder="owner@example.com"></div>
          <div class="fld"><label>كلمة المرور</label><input id="mPass" placeholder="كلمة مرور التاجر"></div>
          <div class="fld"><label>الباقة</label><select id="mPlan"></select></div>
          <div class="fld"><label>المدة (أشهر)</label><input id="mMonths" type="number" min="1" value="1"></div>
        </div>
        <div class="frm-actions"><button class="btn btn-a" id="addM"><i class="fas fa-plus"></i> إنشاء الاشتراك</button></div>
      </div>

      <div class="card">
        <h3><i class="fas fa-list-check"></i> اشتراكات المتاجر</h3>
        <div class="tbl-wrap">
          <table>
            <thead><tr><th>المتجر</th><th>المالك</th><th>الباقة</th><th>الحالة</th><th>تاريخ الانتهاء</th><th>إجراءات</th></tr></thead>
            <tbody id="mBody"></tbody>
          </table>
        </div>
        <p class="muted" id="emptyM" style="display:none">لا توجد اشتراكات بعد — أضف أول متجر بالأعلى.</p>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="config.js"></script>
  <script src="super-admin.js"></script>
</body>
</html>
